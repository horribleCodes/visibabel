repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: build-extension
        name: Build extension
        entry: npm --prefix ./extension run build:extension
        language: system
        files: ^extension/.*$
        stages: [pre-push]
        pass_filenames: false
        always_run: false
        verbose: true
      - id: ext-unit-tests
        name: Extension unit tests
        entry: npm --prefix ./extension run test:unit
        language: system
        files: |
          (?x)^extension/(
            src/.*|
            package-lock.json|
            jest.config.cjs|
            tsconfig.json|
            tsconfig.jest.json
          )$
        stages: [pre-push]
        pass_filenames: false
        always_run: false
        verbose: true
